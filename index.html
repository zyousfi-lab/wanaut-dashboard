<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanaut · Dashboard Opérationnel 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#ffffff;--bg2:#f7f6f3;--bg3:#eeede8;--text:#1a1a1a;--text2:#737370;--border:rgba(0,0,0,0.1);--purple:#7F77DD;--purple-l:#EEEDFE;--teal:#1D9E75;--teal-l:#E1F5EE;--amber:#EF9F27;--amber-l:#FAEEDA;--green:#3B6D11;--green-l:#EAF3DE;--red:#A32D2D;--red-l:#FCEBEB;--gray:#888780}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:20px;font-size:13px;line-height:1.4;min-width:0;overflow-x:hidden}
.loading{display:flex;align-items:center;justify-content:center;height:200px;font-size:14px;color:var(--text2)}
.spinner{width:20px;height:20px;border:2px solid var(--bg3);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:0.5px solid var(--border)}
.logo{width:34px;height:34px;background:var(--purple-l);border-radius:50%;display:flex;align-items:center;justify-content:center}
.h-title{font-size:16px;font-weight:600}
.h-sub{font-size:11px;color:var(--text2);margin-top:1px}
.h-right{margin-left:auto;text-align:right}
.h-score-l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.h-score-v{font-size:26px;font-weight:700}
.sec{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:10px}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.kpi{background:var(--bg2);border-radius:10px;padding:12px 14px}
.kl{font-size:11px;color:var(--text2);margin-bottom:3px}
.kv{font-size:20px;font-weight:700}
.ks{font-size:10px;margin-top:2px}
.ok{color:#3B6D11}.warn{color:#854F0B}.danger{color:var(--red)}.neutral{color:var(--text2)}

/* Quarter selector row */
.qrow{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.qrow-label{font-size:11px;color:var(--text2);margin-right:2px}
.qselect-wrap{display:flex;gap:4px;flex-wrap:wrap}
.qbtn{font-size:11px;padding:5px 14px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.18);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500}
.qbtn:hover{background:var(--bg2)}
.qbtn.active{background:var(--purple);color:#fff;border-color:var(--purple);font-weight:600}
.qbtn.all-q{border-style:dashed}
.qbtn.all-q.active{background:var(--bg3);color:var(--text);border-color:rgba(0,0,0,0.3);border-style:solid}

.frow{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.18);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.fbtn:hover{background:var(--bg2)}
.fbtn.active{background:var(--bg2);color:var(--text);border-color:rgba(0,0,0,0.3);font-weight:600}
.four{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.tgrid{display:grid;grid-template-rows:1fr 1fr;gap:12px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px}
.ct{font-size:12px;font-weight:600;margin-bottom:2px}
.cs{font-size:10px;color:var(--text2);margin-bottom:10px}
.tc{transition:all .2s}
.tc.dimmed{opacity:.18}
.pr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.pr:last-child{margin-bottom:0}
.pn{font-size:10px;color:var(--text2);flex:1;line-height:1.3}
.pt{width:64px;flex-shrink:0;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .6s}
.pp{font-size:10px;font-weight:700;min-width:26px;text-align:right}
.badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap}
.b-done{background:var(--teal-l);color:#085041}
.b-on{background:var(--green-l);color:var(--green)}
.b-risk{background:var(--amber-l);color:#854F0B}
.b-block{background:var(--red-l);color:var(--red)}
.b-todo{background:var(--bg3);color:var(--gray)}
.b-q1{background:#EDE9FD;color:#534AB7}
.b-q2{background:#E1F5EE;color:#085041}
.b-q3{background:#FAEEDA;color:#854F0B}
.b-q4{background:#FCEBEB;color:#A32D2D}
.jrow{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.jrow:last-child{border-bottom:none;padding-bottom:0}
.jdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px}
.jname{font-size:11px;flex:1;line-height:1.35;color:var(--text)}
.jsub{font-size:10px;color:var(--text2);margin-top:1px}
.bh{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:7px;border-bottom:0.5px solid var(--border)}
.bh-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.bh-t{font-size:12px;font-weight:600}
.bh-c{font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:auto}
.cr{background:var(--red-l);color:var(--red)}
.cg{background:var(--teal-l);color:#085041}
.empty-state{font-size:11px;color:var(--text2);padding:8px 0;font-style:italic}
.last-update{text-align:center;font-size:10px;color:var(--text2);padding-top:8px;border-top:0.5px solid var(--border);margin-top:4px}

@media(max-width:1100px){.four{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.kgrid{grid-template-columns:repeat(2,1fr)}.two{grid-template-columns:1fr}}
@media(max-width:600px){.four{grid-template-columns:1fr}.kgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  Chargement des données Notion...
</div>

<div id="dashboard" style="display:none">

<div class="header">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="20" fill="#EEEDFE"/>
      <ellipse cx="22" cy="18" rx="7" ry="8" fill="#534AB7"/>
      <ellipse cx="22" cy="17" rx="4.5" ry="5" fill="#B5D4F4"/>
      <rect x="15" y="24" width="14" height="9" rx="4" fill="#534AB7"/>
      <rect x="10" y="23" width="6" height="4" rx="2" fill="#7F77DD"/>
      <rect x="28" y="23" width="6" height="4" rx="2" fill="#7F77DD"/>
    </svg>
  </div>
  <div>
    <div class="h-title">Wanaut · Dashboard opérationnel</div>
    <div class="h-sub" id="subtitle">Pilotage 2026</div>
  </div>
  <div class="h-right">
    <div class="h-score-l" id="score-label">Score global</div>
    <div class="h-score-v" id="gscore">—</div>
  </div>
</div>

<!-- Quarter selector -->
<div class="sec">Trimestre</div>
<div class="qrow">
  <div class="qselect-wrap" id="quarter-row"></div>
</div>

<div class="sec" id="kpi-section-label">Indicateurs clés</div>
<div class="kgrid">
  <div class="kpi"><div class="kl" id="kl0">Équipe</div><div class="kv" id="kv0">—</div><div class="ks neutral" id="ks0">—</div></div>
  <div class="kpi"><div class="kl" id="kl1">Complétion</div><div class="kv" id="kv1">—</div><div class="ks" id="ks1">—</div></div>
  <div class="kpi"><div class="kl">Objectifs livrés</div><div class="kv" id="kv2">—</div><div class="ks" id="ks2">—</div></div>
  <div class="kpi"><div class="kl">Bloqués / à risque</div><div class="kv" id="kv3">—</div><div class="ks" id="ks3">—</div></div>
</div>

<div class="sec">Filtrer par équipe</div>
<div class="frow" id="filter-row"></div>

<div class="sec" id="cards-section-label">Progression par équipe</div>
<div class="four" id="team-cards"></div>

<div class="two">
  <div class="tgrid">
    <div class="card">
      <div class="bh">
        <div class="bh-dot" style="background:#E24B4A"></div>
        <div class="bh-t">Points d'attention</div>
        <span class="bh-c cr" id="alert-count">—</span>
      </div>
      <div id="alerts-list"></div>
    </div>
    <div class="card">
      <div class="bh">
        <div class="bh-dot" style="background:#1D9E75"></div>
        <div class="bh-t">Succès</div>
        <span class="bh-c cg" id="success-count">—</span>
      </div>
      <div id="success-list"></div>
    </div>
  </div>
  <div class="card">
    <div class="ct" style="margin-bottom:12px">Répartition des statuts</div>
    <div style="position:relative;height:200px;margin-bottom:12px"><canvas id="donut1"></canvas></div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:10px" id="donut-legend"></div>
  </div>
</div>

<div class="last-update" id="last-update"></div>

</div>

<script>
const OKR_DB = '326301c54dff8075a5c1d665ea32d9ea';
const TEAMS_DB = '168301c54dff83ac8d1481f03c5a293c';

const TEAM_COLORS = {
  'Marketing & Communication': '#7F77DD',
  'Sales & Customer success': '#1D9E75',
  'Management': '#EF9F27',
  'Product': '#378ADD',
  'Operations': '#D85A30'
};
const TEAM_LABELS = {
  'Marketing & Communication': '🎙️ Marketing & Com',
  'Sales & Customer success': '📈 Sales & CS',
  'Management': '🏗️ Management / Ops',
  'Product': '⚙️ Product',
  'Operations': '🏢 Operations'
};

// Quarter config
const QUARTERS = ['T1','T2','T3','T4'];
const Q_ALIASES = { 'Q1':'T1','Q2':'T2','Q3':'T3','Q4':'T4' }; // normalize API variants
const Q_LABELS = { 'T1':'T1 · Jan–Mar','T2':'T2 · Avr–Jun','T3':'T3 · Jul–Sep','T4':'T4 · Oct–Déc' };
const Q_BADGE  = { 'T1':'b-q1','T2':'b-q2','T3':'b-q3','T4':'b-q4' };

// Detect current quarter from today's date
function currentQuarter() {
  const m = new Date().getMonth() + 1;
  if (m <= 3) return 'T1';
  if (m <= 6) return 'T2';
  if (m <= 9) return 'T3';
  return 'T4';
}

let allOKRs = [];      // all OKRs from Notion (all quarters)
let teamNamesCache = {};
let charts = {};
let donutChart = null;
let currentTeam = 'all';
let selectedQuarters = new Set([currentQuarter()]); // multi-select

// ── Fetch helpers ────────────────────────────────────────────
async function fetchTeamNames() {
  try {
    const res = await fetch(`https://wanaut-notion-proxy.z-yousfi.workers.dev/${TEAMS_DB}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({page_size:100})
    });
    const data = await res.json();
    const cache = {};
    (data.results||[]).forEach(page => {
      const name = page.properties['Teams']?.title?.[0]?.plain_text || '';
      if (name) cache[page.id] = name;
    });
    return cache;
  } catch(e) { return {}; }
}

async function fetchAllOKRs() {
  let all = [], cursor = undefined;
  do {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await fetch(`https://wanaut-notion-proxy.z-yousfi.workers.dev/${OKR_DB}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    all = all.concat(data.results || []);
    cursor = data.has_more ? data.next_cursor : undefined;
  } while (cursor);
  return all;
}

function extractOKR(page) {
  const p = page.properties;
  const name = p['Goal name']?.title?.[0]?.plain_text || 'Sans titre';
  const teamRelation = p['Team']?.relation || [];
  const team = teamRelation.length > 0 ? (teamNamesCache[teamRelation[0].id] || '—') : '—';
  let quarter = p['Quarter']?.select?.name || '—';
  if (Q_ALIASES[quarter]) quarter = Q_ALIASES[quarter]; // normalize Q1→T1 etc.
  const rawProg = p['Progress (rounded)']?.formula?.number ?? p['Progress %']?.number ?? null;
  const progress = rawProg !== null ? Math.round(rawProg) : 0;
  const statut = p['Statut ']?.formula?.string || p['Statut']?.formula?.string || '—';
  const assignee = p['Assignee']?.people?.map(a => a.name).join(', ') || '—';
  const dueDate = p['Due date']?.date?.start || null;
  const priority = p['Priority']?.select?.name || '—';
  return { name, team, quarter, progress, statut, assignee, dueDate, priority };
}

// ── Quarter selector ─────────────────────────────────────────
function buildQuarterRow() {
  const row = document.getElementById('quarter-row');
  row.innerHTML = '';

  // "Tous" button
  const allBtn = document.createElement('button');
  allBtn.className = 'qbtn all-q' + (selectedQuarters.size === 4 ? ' active' : '');
  allBtn.textContent = 'Toute l\'année';
  allBtn.dataset.q = 'all';
  allBtn.onclick = () => {
    QUARTERS.forEach(q => selectedQuarters.add(q));
    refreshDashboard();
    buildQuarterRow();
  };
  row.appendChild(allBtn);

  QUARTERS.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'qbtn' + (selectedQuarters.has(q) && selectedQuarters.size < 4 ? ' active' : '');
    btn.textContent = q;
    btn.title = Q_LABELS[q];
    btn.dataset.q = q;
    btn.onclick = () => {
      if (selectedQuarters.size === 4) {
        // coming from "all" → select only this one
        selectedQuarters = new Set([q]);
      } else if (selectedQuarters.has(q) && selectedQuarters.size === 1) {
        // can't deselect the last one
        return;
      } else if (selectedQuarters.has(q)) {
        selectedQuarters.delete(q);
      } else {
        selectedQuarters.add(q);
      }
      refreshDashboard();
      buildQuarterRow();
    };
    row.appendChild(btn);
  });
}

// ── Active OKRs (filtered by quarter + team) ─────────────────
function getFilteredOKRs(team) {
  let okrs = allOKRs.filter(o => selectedQuarters.has(o.quarter));
  if (team && team !== 'all') okrs = okrs.filter(o => o.team === team);
  return okrs;
}

function getQuarterLabel() {
  if (selectedQuarters.size === 4) return 'Année complète';
  if (selectedQuarters.size === 1) return Q_LABELS[[...selectedQuarters][0]];
  return [...selectedQuarters].sort().map(q => q).join(' + ');
}

// ── Status helpers ────────────────────────────────────────────
function getStatusClass(statut, progress) {
  if (statut.includes('Livré') || progress >= 100) return { cls: 'b-done', label: 'Livré' };
  if (statut.includes('avance') || progress >= 80)  return { cls: 'b-on', label: 'En avance' };
  if (statut.includes('track') || (progress >= 60 && progress < 80)) return { cls: 'b-on', label: 'On track' };
  if (statut.includes('risque') || (progress >= 30 && progress < 60)) return { cls: 'b-risk', label: 'À risque' };
  return { cls: 'b-block', label: 'Bloqué' };
}
function getBarColor(team) { return TEAM_COLORS[team] || '#888780'; }

// ── Filter row (teams) ────────────────────────────────────────
function buildFilterRow(teams) {
  const row = document.getElementById('filter-row');
  row.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'fbtn active';
  allBtn.textContent = 'Toutes les équipes';
  allBtn.onclick = () => filterTeam('all', allBtn);
  row.appendChild(allBtn);
  teams.forEach(team => {
    const btn = document.createElement('button');
    btn.className = 'fbtn';
    btn.textContent = TEAM_LABELS[team] || team;
    btn.onclick = () => filterTeam(team, btn);
    row.appendChild(btn);
  });
}

function filterTeam(team, btn) {
  currentTeam = team;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const okrs = getFilteredOKRs(team);
  updateKPIs(okrs, team);
  document.querySelectorAll('.tc').forEach(c => {
    c.classList.toggle('dimmed', team !== 'all' && c.dataset.team !== team);
  });
  buildAlerts(okrs);
  buildDonut(okrs);
}

// ── KPIs ──────────────────────────────────────────────────────
function updateKPIs(okrs, team) {
  const ql = getQuarterLabel();
  const avg = okrs.length > 0 ? Math.round(okrs.reduce((s,o) => s+o.progress, 0) / okrs.length) : 0;
  const livres = okrs.filter(o => o.progress >= 100).length;
  const bloques = okrs.filter(o => {
    const st = getStatusClass(o.statut, o.progress);
    return st.cls === 'b-block' || st.cls === 'b-risk';
  }).length;

  document.getElementById('kpi-section-label').textContent = `Indicateurs clés · ${ql}`;
  document.getElementById('score-label').textContent = `Score global · ${ql}`;
  document.getElementById('kv0').textContent = team === 'all' ? 'Toutes' : (TEAM_LABELS[team] || team).replace(/^[^ ]+ /, '');
  document.getElementById('ks0').textContent = team === 'all'
    ? `${[...new Set(allOKRs.map(o=>o.team))].length} équipes actives`
    : `${okrs.length} objectifs · ${ql}`;
  document.getElementById('kl1').textContent = `Complétion · ${ql}`;
  document.getElementById('kv1').textContent = avg + '%';
  document.getElementById('ks1').textContent = avg >= 70 ? 'Bonne progression' : 'En dessous de la cible';
  document.getElementById('ks1').className = 'ks ' + (avg >= 70 ? 'ok' : 'warn');
  document.getElementById('kv2').textContent = livres;
  document.getElementById('ks2').textContent = `sur ${okrs.length} objectifs`;
  document.getElementById('ks2').className = 'ks ok';
  document.getElementById('kv3').textContent = bloques;
  document.getElementById('ks3').className = 'ks ' + (bloques > 3 ? 'danger' : 'warn');
  document.getElementById('gscore').textContent = avg + '%';
}

// ── Team cards ────────────────────────────────────────────────
function buildTeamCards(allTeams) {
  const container = document.getElementById('team-cards');
  container.innerHTML = '';
  Object.keys(charts).forEach(id => { try { charts[id].destroy(); } catch(e){} });
  charts = {};

  // All known teams — always render (empty state if no OKRs)
  allTeams.forEach((team, i) => {
    const okrs = getFilteredOKRs(team); // may be empty
    const avg = okrs.length > 0 ? Math.round(okrs.reduce((s,o) => s+o.progress, 0) / okrs.length) : 0;
    const color = TEAM_COLORS[team] || '#888780';
    const livres  = okrs.filter(o => o.progress >= 100).length;
    const ontrack = okrs.filter(o => { const s=getStatusClass(o.statut,o.progress); return s.cls==='b-on' && o.progress<100; }).length;
    const risk    = okrs.filter(o => getStatusClass(o.statut,o.progress).cls==='b-risk').length;
    const block   = okrs.filter(o => getStatusClass(o.statut,o.progress).cls==='b-block').length;
    const ql = getQuarterLabel();

    const canvasId = `semi_${i}`;
    const card = document.createElement('div');
    card.className = 'card tc';
    card.dataset.team = team;

    const progressRows = okrs.length > 0
      ? okrs.map(o => {
          const qBadge = selectedQuarters.size > 1 ? `<span class="badge ${Q_BADGE[o.quarter]||'b-todo'}" style="margin-right:4px">${o.quarter}</span>` : '';
          return `<div class="pr">
            <div class="pn">${qBadge}${o.name.length > 28 ? o.name.substring(0,28)+'…' : o.name}</div>
            <div class="pt"><div class="pb" style="width:${o.progress}%;background:${color}"></div></div>
            <div class="pp">${o.progress}%</div>
          </div>`;
        }).join('')
      : `<div class="empty-state">Aucun objectif pour ${ql}</div>`;

    card.innerHTML = `
      <div class="ct">${TEAM_LABELS[team] || team}</div>
      <div class="cs">${okrs.length > 0 ? okrs.length + ' objectif' + (okrs.length>1?'s':'') + ' · ' + ql : ql}</div>
      <div style="position:relative;height:72px;margin-bottom:10px"><canvas id="${canvasId}"></canvas></div>
      <div style="border-top:0.5px solid var(--border);padding-top:9px">${progressRows}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:9px">
        ${livres > 0  ? `<span class="badge b-done">${livres} livré${livres>1?'s':''}</span>` : ''}
        ${ontrack > 0 ? `<span class="badge b-on">${ontrack} on track</span>` : ''}
        ${risk > 0    ? `<span class="badge b-risk">${risk} à risque</span>` : ''}
        ${block > 0   ? `<span class="badge b-block">${block} bloqué${block>1?'s':''}</span>` : ''}
        ${okrs.length === 0 ? `<span class="badge b-todo">Pas d'objectifs</span>` : ''}
      </div>
    `;
    container.appendChild(card);

    setTimeout(() => {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const dimColor = okrs.length === 0 ? 'rgba(136,135,128,0.08)' : 'rgba(136,135,128,0.12)';
      const mainColor = okrs.length === 0 ? 'rgba(136,135,128,0.25)' : color;
      charts[canvasId] = new Chart(canvas, {
        type: 'doughnut',
        data: { datasets: [{ data: [avg, 100-avg], backgroundColor: [mainColor, dimColor], borderWidth: 0 }] },
        options: { responsive:true, maintainAspectRatio:false, rotation:-90, circumference:180, cutout:'65%', plugins:{ legend:{display:false}, tooltip:{enabled:false} } },
        plugins: [{
          id: 'center',
          afterDraw(chart) {
            const { ctx, chartArea: { left, right, bottom } } = chart;
            ctx.save();
            ctx.font = '700 13px -apple-system,sans-serif';
            ctx.fillStyle = okrs.length === 0 ? '#aaa' : '#1a1a1a';
            ctx.textAlign = 'center';
            ctx.fillText(okrs.length === 0 ? '—' : avg+'%', (left+right)/2, bottom-1);
            ctx.restore();
          }
        }]
      });
    }, 100);
  });
}

// ── Alerts & successes ────────────────────────────────────────
function buildAlerts(okrs) {
  const alerts = okrs.filter(o => {
    const s = getStatusClass(o.statut, o.progress);
    return s.cls === 'b-block' || s.cls === 'b-risk';
  }).sort((a,b) => a.progress - b.progress);
  const successes = okrs.filter(o => o.progress >= 100);

  document.getElementById('alert-count').textContent = alerts.length;
  document.getElementById('success-count').textContent = successes.length + ' victoires';

  document.getElementById('alerts-list').innerHTML = alerts.length === 0
    ? '<div class="empty-state">Aucun point d\'attention 🎉</div>'
    : alerts.slice(0,5).map(o => {
        const s = getStatusClass(o.statut, o.progress);
        const dot = s.cls === 'b-block' ? '#E24B4A' : '#EF9F27';
        const qTag = selectedQuarters.size > 1 ? `<span class="badge ${Q_BADGE[o.quarter]||'b-todo'}" style="margin-right:3px">${o.quarter}</span>` : '';
        return `<div class="jrow">
          <div class="jdot" style="background:${dot}"></div>
          <div style="flex:1">
            <div class="jname">${qTag}${o.name.length>40?o.name.substring(0,40)+'…':o.name}</div>
            <div class="jsub">${TEAM_LABELS[o.team]||o.team} · ${o.progress}%${o.assignee!=='—'?' · '+o.assignee:''}</div>
          </div>
          <span class="badge ${s.cls}">${s.label}</span>
        </div>`;
      }).join('');

  document.getElementById('success-list').innerHTML = successes.length === 0
    ? '<div class="empty-state">Pas encore de livraisons complètes</div>'
    : successes.slice(0,6).map(o => {
        const qTag = selectedQuarters.size > 1 ? `<span class="badge ${Q_BADGE[o.quarter]||'b-todo'}" style="margin-right:3px">${o.quarter}</span>` : '';
        return `<div class="jrow">
          <div class="jdot" style="background:#1D9E75"></div>
          <div style="flex:1">
            <div class="jname">${qTag}${o.name.length>40?o.name.substring(0,40)+'…':o.name}</div>
            <div class="jsub">${TEAM_LABELS[o.team]||o.team}${o.assignee!=='—'?' · '+o.assignee:''}</div>
          </div>
          <span class="badge b-done">Livré ✓</span>
        </div>`;
      }).join('');
}

// ── Donut ─────────────────────────────────────────────────────
function buildDonut(okrs) {
  const livres  = okrs.filter(o => o.progress >= 100).length;
  const ontrack = okrs.filter(o => { const s=getStatusClass(o.statut,o.progress); return s.cls==='b-on'&&o.progress<100; }).length;
  const risk    = okrs.filter(o => getStatusClass(o.statut,o.progress).cls==='b-risk').length;
  const block   = okrs.filter(o => getStatusClass(o.statut,o.progress).cls==='b-block').length;
  const total   = okrs.length || 1;

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donut1'), {
    type: 'doughnut',
    data: { datasets: [{ data: [livres,ontrack,risk,block], backgroundColor: ['#5DCAA5','#97C459','#EF9F27','#E24B4A'], borderWidth:0, hoverOffset:4 }] },
    options: { responsive:true, maintainAspectRatio:false, cutout:'66%', plugins:{ legend:{display:false} } }
  });
  document.getElementById('donut-legend').innerHTML = [
    { color:'#5DCAA5', label:`Livré ${Math.round(livres/total*100)}% (${livres})` },
    { color:'#97C459', label:`On track ${Math.round(ontrack/total*100)}% (${ontrack})` },
    { color:'#EF9F27', label:`À risque ${Math.round(risk/total*100)}% (${risk})` },
    { color:'#E24B4A', label:`Bloqué ${Math.round(block/total*100)}% (${block})` }
  ].map(i => `<span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:${i.color}"></span><span style="color:var(--text2)">${i.label}</span></span>`).join('');
}

// ── Main refresh (called on quarter/team change) ───────────────
function refreshDashboard() {
  currentTeam = 'all';
  document.querySelectorAll('.fbtn').forEach((b,i) => b.classList.toggle('active', i===0));

  const visibleOKRs = getFilteredOKRs('all');
  const allTeams = [...new Set(allOKRs.map(o => o.team))].filter(t => t !== '—');

  updateKPIs(visibleOKRs, 'all');
  buildTeamCards(allTeams);
  buildAlerts(visibleOKRs);
  buildDonut(visibleOKRs);

  const ql = getQuarterLabel();
  document.getElementById('subtitle').textContent = `Pilotage ${ql} · ${visibleOKRs.length} objectifs`;
  document.getElementById('cards-section-label').textContent = `Progression par équipe · ${ql}`;
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  try {
    teamNamesCache = await fetchTeamNames();
    const pages = await fetchAllOKRs();
    allOKRs = pages.map(extractOKR).filter(o => o.quarter !== '—');

    const allTeams = [...new Set(allOKRs.map(o => o.team))].filter(t => t !== '—');

    buildQuarterRow();
    buildFilterRow(allTeams);
    refreshDashboard();

    const now = new Date();
    document.getElementById('last-update').textContent = `Données Notion · mis à jour le ${now.toLocaleDateString('fr-FR')} à ${now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  } catch(err) {
    document.getElementById('loading').innerHTML = `<div style="color:var(--red);text-align:center"><div style="font-size:14px;margin-bottom:8px">Erreur de connexion Notion</div><div style="font-size:12px;color:var(--text2)">${err.message}</div></div>`;
  }
}

// ── Password ──────────────────────────────────────────────────
const PASSWORD = "zizirules";
function checkPassword() {
  const stored = sessionStorage.getItem("wanaut_auth");
  if (stored === PASSWORD) { init(); return; }
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:#f7f6f3;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:-apple-system,sans-serif";
  overlay.innerHTML = `<div style="background:white;border-radius:16px;padding:32px 40px;border:0.5px solid rgba(0,0,0,0.1);text-align:center;max-width:320px;width:90%">
    <div style="width:44px;height:44px;background:#EEEDFE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="20" height="20" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="20" fill="#EEEDFE"/><ellipse cx="22" cy="18" rx="7" ry="8" fill="#534AB7"/><ellipse cx="22" cy="17" rx="4.5" ry="5" fill="#B5D4F4"/><rect x="15" y="24" width="14" height="9" rx="4" fill="#534AB7"/><rect x="10" y="23" width="6" height="4" rx="2" fill="#7F77DD"/><rect x="28" y="23" width="6" height="4" rx="2" fill="#7F77DD"/></svg>
    </div>
    <div style="font-size:16px;font-weight:600;margin-bottom:4px;color:#1a1a1a">Wanaut Dashboard</div>
    <div style="font-size:12px;color:#737370;margin-bottom:20px">Accès restreint · Équipe Wanaut</div>
    <input id="pwd-input" type="password" placeholder="Mot de passe" style="width:100%;padding:10px 14px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px">
    <div id="pwd-error" style="font-size:11px;color:#A32D2D;margin-bottom:10px;display:none">Mot de passe incorrect</div>
    <button id="pwd-btn" style="width:100%;padding:10px;background:#534AB7;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Accéder au dashboard</button>
  </div>`;
  document.body.appendChild(overlay);
  const input = document.getElementById("pwd-input");
  const btn = document.getElementById("pwd-btn");
  const error = document.getElementById("pwd-error");
  input.focus();
  function tryLogin() {
    if (input.value === PASSWORD) { sessionStorage.setItem("wanaut_auth", PASSWORD); overlay.remove(); init(); }
    else { error.style.display="block"; input.value=""; input.focus(); }
  }
  btn.onclick = tryLogin;
  input.onkeydown = e => { if(e.key==="Enter") tryLogin(); };
}
checkPassword();
</script>
