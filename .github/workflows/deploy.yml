name: Deploy Dashboard
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Inject token
        run: |
          sed -i "s|%%NOTION_TOKEN%%|${{ secrets.NOTION_TOKEN }}|g" index.html
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
